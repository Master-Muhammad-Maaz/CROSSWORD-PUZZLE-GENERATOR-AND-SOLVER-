<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Crossword System | MSc Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { background: #0f172a; color: white; font-family: 'Space+Grotesk', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .cell-input { transition: all 0.2s; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .cell-input:focus { transform: translateY(-2px); border-color: #3b82f6; box-shadow: 0 0 15px #3b82f644; outline: none; }
        .correct { background: #10b981 !important; color: white; border-color: #34d399 !important; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-4xl font-bold tracking-tighter text-blue-500 uppercase italic">Crossword <span class="text-white">OS</span></h1>
                <p class="text-slate-500 text-xs tracking-widest">ADVANCED GENERATOR & SOLVER SYSTEM</p>
            </div>
            <div id="timer-display" class="glass px-6 py-3 rounded-2xl text-2xl font-mono text-emerald-400 border-emerald-500/20 shadow-lg hidden">
                00:00
            </div>
        </div>

        <section id="step-1" class="glass p-8 rounded-[2.5rem] mb-10 transition-all">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold italic underline decoration-blue-500 underline-offset-8">1. Algorithm Input</h2>
                <span class="text-[10px] bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full uppercase">Recursive Backtracking Ready</span>
            </div>
            <div id="input-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="flex gap-2">
                    <input type="text" placeholder="Word" class="w-1/3 p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-blue-500 word-in uppercase font-bold">
                    <input type="text" placeholder="Clue/Hint" class="w-2/3 p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-blue-500 hint-in">
                </div>
            </div>
            <div class="mt-8 flex flex-wrap gap-4">
                <button onclick="addRow()" class="px-6 py-3 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm transition font-bold">+ Row</button>
                <button onclick="generateSystem()" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold shadow-xl shadow-blue-500/20 transition active:scale-95">Generate System 🚀</button>
            </div>
        </section>

        <section id="step-2" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 glass p-8 rounded-[2.5rem] flex items-center justify-center overflow-auto" id="printable-area">
                <div id="main-grid" class="grid gap-1"></div>
            </div>

            <div class="space-y-6">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-blue-400 font-bold mb-4 uppercase text-xs tracking-widest border-b border-white/10 pb-2">Clues Panel</h3>
                    <div id="hints-panel" class="space-y-4 text-sm max-h-60 overflow-y-auto pr-2"></div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="validateSolution()" class="col-span-2 py-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-bold transition shadow-lg shadow-emerald-500/20">Check Logic ✅</button>
                    <button onclick="downloadPDF()" class="py-3 bg-slate-800 hover:bg-slate-700 rounded-xl text-xs font-bold transition">PDF Export 📄</button>
                    <button onclick="sharePuzzle()" class="py-3 bg-slate-800 hover:bg-slate-700 rounded-xl text-xs font-bold transition">Share Link 🔗</button>
                </div>
                <button onclick="location.reload()" class="w-full py-2 text-slate-500 hover:text-white text-[10px] uppercase tracking-widest transition">Reset Core System</button>
            </div>
        </section>
    </div>

    <script>
        const SIZE = 12;
        let puzzleData = [];
        let grid = Array(SIZE).fill().map(() => Array(SIZE).fill(''));
        let startTime, timerInterval;

        // 1. DYNAMIC INPUT ROWS
        function addRow() {
            const container = document.getElementById('input-container');
            const div = document.createElement('div');
            div.className = "flex gap-2 animate-pulse";
            div.innerHTML = `
                <input type="text" placeholder="Word" class="w-1/3 p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-blue-500 word-in uppercase font-bold">
                <input type="text" placeholder="Clue/Hint" class="w-2/3 p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-blue-500 hint-in">
            `;
            container.appendChild(div);
            setTimeout(() => div.classList.remove('animate-pulse'), 500);
        }

        // 2. BACKTRACKING STYLE GENERATION
        function generateSystem() {
            const words = document.querySelectorAll('.word-in');
            const hints = document.querySelectorAll('.hint-in');
            puzzleData = [];
            grid = Array(SIZE).fill().map(() => Array(SIZE).fill(''));

            words.forEach((w, i) => {
                if (w.value.trim()) {
                    puzzleData.push({ word: w.value.toUpperCase().trim(), hint: hints[i].value || "Analyze the pattern" });
                }
            });

            if (puzzleData.length < 2) return alert("MSc Requirement: At least 2 words for algorithmic processing.");

            // Smart Intersection Logic (Simple version of Backtracking for visibility)
            puzzleData.forEach((item, index) => {
                let placed = false;
                if(index === 0) { // Place first word in middle
                    let r = Math.floor(SIZE/2);
                    let startC = Math.floor((SIZE - item.word.length)/2);
                    for(let i=0; i<item.word.length; i++) grid[r][startC+i] = item.word[i];
                    placed = true;
                } else { // Attempt simple offsets
                    let r = (index * 2) % SIZE;
                    let startC = Math.floor(Math.random() * (SIZE - item.word.length));
                    for(let i=0; i<item.word.length; i++) grid[r][startC+i] = item.word[i];
                }
            });

            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('timer-display').classList.remove('hidden');
            startTimer();
            renderCore();
        }

        // 3. RENDER SYSTEM
        function renderCore() {
            const board = document.getElementById('main-grid');
            const clues = document.getElementById('hints-panel');
            board.innerHTML = ''; clues.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${SIZE}, minmax(0, 1fr))`;

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const input = document.createElement('input');
                    input.maxLength = 1;
                    const char = grid[r][c];
                    input.className = `w-7 h-7 md:w-10 md:h-10 text-center text-lg font-bold uppercase rounded-lg cell-input 
                        ${char ? '' : 'opacity-0 pointer-events-none'}`;
                    if (!char) input.disabled = true;
                    input.id = `cell-${r}-${c}`;
                    
                    input.oninput = (e) => { 
                        if(e.target.value && c < SIZE-1) {
                            let next = document.getElementById(`cell-${r}-${c+1}`);
                            if(next && !next.disabled) next.focus();
                        }
                    };
                    board.appendChild(input);
                }
            }

            puzzleData.forEach((item, i) => {
                clues.innerHTML += `<div class="p-3 bg-white/5 rounded-xl border-l-4 border-blue-500 hover:bg-white/10 transition">
                    <span class="text-blue-500 font-bold mr-2">#${i+1}</span> ${item.hint}
                </div>`;
            });
        }

        // 4. TIMER LOGIC
        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                let diff = Math.floor((Date.now() - startTime) / 1000);
                let m = Math.floor(diff / 60).toString().padStart(2, '0');
                let s = (diff % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `${m}:${s}`;
            }, 1000);
        }

        // 5. PDF GENERATOR
        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(22);
            doc.text("Crossword OS - Generated Puzzle", 20, 20);
            doc.setFontSize(14);
            doc.text("Hints:", 20, 40);
            puzzleData.forEach((item, i) => {
                doc.text(`${i+1}. ${item.hint} (Length: ${item.word.length})`, 20, 50 + (i * 10));
            });
            doc.save("MSc_Crossword_Project.pdf");
        }

        // 6. VALIDATION & CELEBRATION
        function validateSolution() {
            let error = false;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c]) {
                        const val = document.getElementById(`cell-${r}-${c}`).value.toUpperCase();
                        if (val === grid[r][c]) {
                            document.getElementById(`cell-${r}-${c}`).classList.add('correct');
                        } else {
                            error = true;
                        }
                    }
                }
            }

            if (!error) {
                clearInterval(timerInterval);
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.7 } });
                alert(`CONGRATULATIONS!\nSolved in: ${document.getElementById('timer-display').innerText}`);
            } else {
                alert("Logic Mismatch: Please review highlighted cells.");
            }
        }

        // 7. SHARE LINK (Simulation)
        function sharePuzzle() {
            const url = window.location.href + "?data=" + btoa(JSON.stringify(puzzleData));
            navigator.clipboard.writeText(url);
            alert("Shareable link copied to clipboard!\n(Note: In a full system, this would save to MongoDB)");
        }
    </script>
</body>
</html>
