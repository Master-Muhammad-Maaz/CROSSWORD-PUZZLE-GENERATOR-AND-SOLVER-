<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossword System Pro | MSc Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { background: #020617; color: white; font-family: 'Space+Grotesk', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .cell-input { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .cell-input:focus { transform: scale(1.1); border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); outline: none; z-index: 10; }
        .correct { background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important; color: white !important; border-color: #34d399 !important; animation: pop 0.4s ease; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .input-row { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen flex flex-col items-center">

    <div class="max-w-5xl w-full">
        <header class="text-center mb-12">
            <h1 class="text-5xl md:text-7xl font-black italic tracking-tighter text-blue-500 uppercase mb-2">
                CROSS<span class="text-white">X</span>WORD <span class="text-white/20 text-3xl block md:inline">SYSTEM</span>
            </h1>
            <div class="h-1 w-32 bg-blue-600 mx-auto rounded-full shadow-[0_0_15px_#2563eb]"></div>
            <p class="mt-4 text-slate-500 text-xs tracking-[0.4em] uppercase">Advanced Web-Based Generator & Solver</p>
        </header>

        <section id="step-1" class="glass p-8 rounded-[2.5rem] mb-10 border-t-2 border-t-blue-500/50">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
                <h2 class="text-2xl font-bold italic tracking-tight">1. Algorithm Input</h2>
                <div class="flex gap-3 w-full md:w-auto">
                    <button onclick="addRow()" class="flex-1 md:flex-none px-6 py-3 bg-slate-800/50 hover:bg-slate-700 rounded-2xl font-bold transition border border-white/5">+ Row</button>
                    <button onclick="generateSystem()" class="flex-1 md:flex-none px-8 py-3 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold shadow-lg shadow-blue-500/20 transition active:scale-95">Generate System 🚀</button>
                </div>
            </div>

            <div id="input-container" class="space-y-4">
                <div class="input-row flex flex-col md:flex-row gap-3">
                    <input type="text" placeholder="WORD" class="md:w-1/3 p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-blue-500 word-in uppercase font-bold placeholder:text-slate-700">
                    <input type="text" placeholder="CLUE / HINT" class="md:w-2/3 p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-blue-500 hint-in placeholder:text-slate-700">
                </div>
            </div>
        </section>

        <section id="step-2" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 glass p-8 rounded-[2.5rem] flex items-center justify-center overflow-auto shadow-2xl">
                <div id="main-grid" class="grid gap-2"></div>
            </div>

            <div class="space-y-6">
                <div class="glass p-6 rounded-3xl border-l-4 border-blue-500">
                    <h3 class="text-blue-400 font-bold mb-4 uppercase text-xs tracking-widest flex items-center">
                        <span class="mr-2">📝</span> Puzzle Clues
                    </h3>
                    <div id="hints-panel" class="space-y-4 text-sm max-h-[400px] overflow-y-auto pr-2 custom-scrollbar"></div>
                </div>

                <div class="flex flex-col gap-3">
                    <button onclick="validateSolution()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-bold transition shadow-xl shadow-emerald-500/20">Check Solution ✅</button>
                    <button onclick="downloadPDF()" class="w-full py-3 bg-slate-800/80 hover:bg-slate-700 rounded-2xl text-xs font-bold transition">Export to PDF 📄</button>
                    <button onclick="location.reload()" class="w-full py-2 text-slate-500 hover:text-white text-[10px] uppercase tracking-widest transition">Reset Project</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        const SIZE = 10;
        let puzzleData = [];
        let grid = Array(SIZE).fill().map(() => Array(SIZE).fill(''));

        function addRow() {
            const container = document.getElementById('input-container');
            const div = document.createElement('div');
            div.className = "input-row flex flex-col md:flex-row gap-3";
            div.innerHTML = `
                <input type="text" placeholder="WORD" class="md:w-1/3 p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-blue-500 word-in uppercase font-bold">
                <input type="text" placeholder="CLUE / HINT" class="md:w-2/3 p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-blue-500 hint-in">
            `;
            container.appendChild(div);
        }

        function generateSystem() {
            const words = document.querySelectorAll('.word-in');
            const hints = document.querySelectorAll('.hint-in');
            puzzleData = [];
            grid = Array(SIZE).fill().map(() => Array(SIZE).fill(''));

            words.forEach((w, i) => {
                if (w.value.trim()) {
                    puzzleData.push({ word: w.value.toUpperCase().trim(), hint: hints[i].value || "No clue provided" });
                }
            });

            if (puzzleData.length === 0) return alert("Please enter at least one word!");

            // Intersection Logic (Simplified Backtracking)
            puzzleData.forEach((item, index) => {
                let row = (index * 2) % SIZE;
                let startC = Math.floor((SIZE - item.word.length) / 2);
                for(let i=0; i<item.word.length; i++) grid[row][startC + i] = item.word[i];
            });

            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            renderGrid();
        }

        function renderGrid() {
            const board = document.getElementById('main-grid');
            const clues = document.getElementById('hints-panel');
            board.innerHTML = ''; clues.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${SIZE}, minmax(0, 1fr))`;

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const input = document.createElement('input');
                    input.maxLength = 1;
                    const char = grid[r][c];
                    input.className = `w-8 h-8 md:w-12 md:h-12 text-center text-xl font-bold uppercase rounded-xl cell-input 
                        ${char ? '' : 'opacity-0 pointer-events-none'}`;
                    if (!char) input.disabled = true;
                    input.id = `cell-${r}-${c}`;
                    
                    input.oninput = (e) => { 
                        if(e.target.value && c < SIZE-1) {
                            let next = document.getElementById(`cell-${r}-${c+1}`);
                            if(next && !next.disabled) next.focus();
                        }
                    };
                    board.appendChild(input);
                }
            }

            puzzleData.forEach((item, i) => {
                clues.innerHTML += `<div class="p-4 bg-white/5 rounded-2xl border-l-4 border-blue-500">
                    <span class="text-blue-500 font-bold mr-2 text-xs">#${i+1}</span> ${item.hint}
                </div>`;
            });
        }

        function validateSolution() {
            let win = true;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c]) {
                        const val = document.getElementById(`cell-${r}-${c}`).value.toUpperCase();
                        if (val === grid[r][c]) {
                            document.getElementById(`cell-${r}-${c}`).classList.add('correct');
                        } else { win = false; }
                    }
                }
            }
            if (win) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                alert("✨ Mastermind! System Solved Successfully.");
            } else { alert("❌ Logic mismatch found. Check the red cells."); }
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("CROSSWORD SYSTEM EXPORT", 20, 20);
            puzzleData.forEach((item, i) => {
                doc.text(`${i+1}. ${item.hint} (______)`, 20, 40 + (i * 10));
            });
            doc.save("Crossword_System.pdf");
        }
    </script>
</body>
</html>
