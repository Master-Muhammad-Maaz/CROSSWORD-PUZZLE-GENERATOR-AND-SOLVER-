<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossword Pro | Animated Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            min-height: 100 screen;
            overflow-x: hidden;
        }

        /* Glassmorphism Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Animated Input Cells */
        .cell-input {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .cell-input:focus {
            transform: scale(1.15) translateY(-5px);
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            outline: none;
            z-index: 20;
        }

        /* Success Animation */
        .correct {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important;
            border-color: #34d399 !important;
            color: white !important;
            animation: pop-in 0.5s ease forwards;
        }

        @keyframes pop-in {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        .hint-item {
            animation: slideLeft 0.5s ease forwards;
            opacity: 0;
        }

        @keyframes slideLeft {
            from { transform: translateX(30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Title Glow */
        .neon-text {
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.8), 0 0 20px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="text-slate-200 flex flex-col items-center p-6 sm:p-10">

    <div class="max-w-5xl w-full">
        <header class="text-center mb-12">
            <h1 class="text-5xl sm:text-7xl font-black italic tracking-tighter neon-text mb-2">
                CROSS<span class="text-blue-500">X</span>WORD
            </h1>
            <p class="text-blue-400 font-mono tracking-[0.3em] text-xs uppercase">Intelligent Puzzle Solver</p>
        </header>

        <main class="flex flex-col lg:flex-row gap-10 justify-center items-start">
            <div class="glass-card p-6 rounded-[2rem] flex-shrink-0 mx-auto">
                <div id="grid-container" class="grid gap-2 p-2"></div>
            </div>

            <div class="w-full lg:w-96 space-y-6">
                <div class="glass-card p-8 rounded-3xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10">
                        <svg width="100" height="100" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    </div>
                    <h3 class="text-blue-400 font-bold flex items-center mb-6 uppercase tracking-widest text-sm">
                        <span class="bg-blue-500/20 p-2 rounded-lg mr-3">📝</span> Clues to solve
                    </h3>
                    <div id="hints-list" class="space-y-4"></div>
                </div>

                <div class="flex flex-col gap-3">
                    <button onclick="checkPuzzle()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-bold shadow-lg shadow-blue-900/20 transition-all active:scale-95 text-lg">
                        Check Solution 🚀
                    </button>
                    <button onclick="location.reload()" class="w-full py-3 bg-slate-800/50 hover:bg-slate-700 text-slate-400 rounded-2xl font-semibold border border-white/5 transition-all text-sm">
                        Refresh New Puzzle
                    </button>
                </div>
                <div id="message" class="text-center font-bold text-xl h-8"></div>
            </div>
        </main>
    </div>

    <script>
        const wordList = ["APPLE", "RIVER", "CHAIR", "TABLE", "LIGHT", "TRAIN", "BREAD", "SMILE", "CLOCK", "PLANT", "OCEAN", "TIGER", "HORSE", "EAGLE", "SHARK", "VALLEY", "BRIDGE", "GARDEN", "SCHOOL", "PENCIL", "MOUSE", "MOBILE", "CAMERA", "MIRROR", "COFFEE", "PIZZA", "CANDY", "WATER", "DANCE", "MOVIE", "STORY", "DREAM", "SLEEP", "SUMMER", "WINTER"];

        const GRID_SIZE = 8;
        let selectedWords = [];
        let gridData = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(''));

        function initGame() {
            selectedWords = [...wordList].sort(() => 0.5 - Math.random()).slice(0, 5);
            
            selectedWords.forEach((word, index) => {
                let row = index + 1;
                let startCol = Math.floor((GRID_SIZE - word.length) / 2);
                for(let i=0; i<word.length; i++) {
                    gridData[row][startCol + i] = word[i];
                }
            });

            renderGrid();
            renderHints();
        }

        function renderGrid() {
            const container = document.getElementById('grid-container');
            container.style.gridTemplateColumns = `repeat(${GRID_SIZE}, minmax(0, 1fr))`;
            
            for(let r=0; r<GRID_SIZE; r++) {
                for(let c=0; c<GRID_SIZE; c++) {
                    const input = document.createElement('input');
                    input.maxLength = 1;
                    const isActive = gridData[r][c] !== '';
                    
                    input.className = `w-10 h-10 sm:w-14 sm:h-14 text-center text-2xl font-black uppercase rounded-xl cell-input 
                        ${isActive ? '' : 'opacity-0 cursor-default'}`;
                    
                    if(!isActive) input.disabled = true;
                    input.id = `c-${r}-${c}`;
                    
                    // Intelligent Navigation
                    input.addEventListener('keydown', (e) => {
                        if(e.key === "Backspace" && !e.target.value && c > 0) {
                            const prev = document.getElementById(`c-${r}-${c-1}`);
                            if(prev && !prev.disabled) prev.focus();
                        }
                    });

                    input.addEventListener('input', (e) => {
                        if(e.target.value && c < GRID_SIZE - 1) {
                            const next = document.getElementById(`c-${r}-${c+1}`);
                            if(next && !next.disabled) next.focus();
                        }
                    });

                    container.appendChild(input);
                }
            }
        }

        function renderHints() {
            const hintsDiv = document.getElementById('hints-list');
            selectedWords.forEach((word, i) => {
                const scrambled = word.split('').sort(() => 0.5 - Math.random()).join('');
                const delay = i * 0.1;
                hintsDiv.innerHTML += `
                    <div class="hint-item flex items-center gap-3 group" style="animation-delay: ${delay}s">
                        <span class="w-2 h-2 bg-blue-500 rounded-full group-hover:scale-150 transition-transform"></span>
                        <p class="text-slate-400">Unscramble: <span class="text-white font-mono tracking-widest bg-white/5 px-2 py-1 rounded">${scrambled}</span></p>
                    </div>`;
            });
        }

        function checkPuzzle() {
            let allCorrect = true;
            let totalActiveCells = 0;
            let correctCells = 0;

            for(let r=0; r<GRID_SIZE; r++) {
                for(let c=0; c<GRID_SIZE; c++) {
                    if(gridData[r][c] !== '') {
                        totalActiveCells++;
                        const cell = document.getElementById(`c-${r}-${c}`);
                        if(cell.value.toUpperCase() === gridData[r][c]) {
                            cell.classList.add('correct');
                            correctCells++;
                        } else {
                            allCorrect = false;
                            cell.classList.remove('correct');
                        }
                    }
                }
            }

            const msg = document.getElementById('message');
            if(allCorrect) {
                msg.innerHTML = "<span class='text-emerald-400'>🎉 MASTERMIND! PROJECT COMPLETE</span>";
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#3b82f6', '#10b981', '#ffffff'] });
            } else {
                msg.innerHTML = "<span class='text-rose-400'>⚠️ SOME ERRORS FOUND</span>";
            }
        }

        initGame();
    </script>
</body>
</html>
