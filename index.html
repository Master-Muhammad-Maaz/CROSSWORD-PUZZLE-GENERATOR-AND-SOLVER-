<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossword System Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); min-height: 100vh; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .cell { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .cell:focus { transform: scale(1.1); border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); outline: none; }
        .correct { background: #10b981 !important; color: white; animation: pop 0.4s ease; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="p-4 sm:p-10 flex flex-col items-center">

    <div class="max-w-4xl w-full">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black tracking-tighter text-blue-500 uppercase">Crossword <span class="text-white">Generator & Solver</span></h1>
            <p class="text-slate-500 text-sm mt-2">Create, Generate, and Solve Puzzles Instantly</p>
        </header>

        <section id="generator-ui" class="glass p-8 rounded-3xl mb-10">
            <h2 class="text-xl font-bold mb-4 flex items-center"><span class="mr-2">⚙️</span> Step 1: Add Your Words</h2>
            <div id="word-inputs" class="space-y-3">
                <div class="flex gap-2">
                    <input type="text" placeholder="Word (e.g. APPLE)" class="w-1/2 p-3 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-blue-500 word-in">
                    <input type="text" placeholder="Hint (e.g. A red fruit)" class="w-1/2 p-3 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-blue-500 hint-in">
                </div>
            </div>
            <div class="flex gap-3 mt-4">
                <button onclick="addInputRow()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm transition">+ Add More</button>
                <button onclick="generatePuzzle()" class="px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold shadow-lg shadow-blue-900/40 transition">Generate Puzzle 🚀</button>
            </div>
        </section>

        <section id="solver-ui" class="hidden flex flex-col lg:flex-row gap-10">
            <div class="glass p-6 rounded-[2rem] mx-auto">
                <div id="grid-container" class="grid gap-2"></div>
            </div>

            <div class="w-full lg:w-72 space-y-6">
                <div class="glass p-6 rounded-2xl">
                    <h3 class="text-blue-400 font-bold mb-4 uppercase text-xs tracking-widest">Puzzle Hints</h3>
                    <div id="hints-display" class="space-y-3 text-sm text-slate-300"></div>
                </div>
                <button onclick="checkAnswers()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-bold transition">Check Solution ✅</button>
                <button onclick="location.reload()" class="w-full py-2 text-slate-500 hover:text-white text-sm transition underline">Create New System</button>
            </div>
        </section>
    </div>

    <script>
        const GRID_SIZE = 10;
        let puzzleData = [];
        let internalGrid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(''));

        function addInputRow() {
            const container = document.getElementById('word-inputs');
            const div = document.createElement('div');
            div.className = "flex gap-2 animate-slideIn";
            div.innerHTML = `
                <input type="text" placeholder="Word" class="w-1/2 p-3 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-blue-500 word-in">
                <input type="text" placeholder="Hint" class="w-1/2 p-3 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-blue-500 hint-in">
            `;
            container.appendChild(div);
        }

        function generatePuzzle() {
            const words = document.querySelectorAll('.word-in');
            const hints = document.querySelectorAll('.hint-in');
            puzzleData = [];
            internalGrid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(''));

            words.forEach((w, i) => {
                if (w.value) {
                    puzzleData.push({ word: w.value.toUpperCase().trim(), hint: hints[i].value || "No hint provided" });
                }
            });

            if (puzzleData.length === 0) return alert("Please add some words first!");

            // Simple Placement Logic (Rows)
            puzzleData.forEach((item, index) => {
                let row = index * 2;
                if (row < GRID_SIZE) {
                    let startCol = Math.floor((GRID_SIZE - item.word.length) / 2);
                    for (let i = 0; i < item.word.length; i++) {
                        internalGrid[row][startCol + i] = item.word[i];
                    }
                }
            });

            document.getElementById('generator-ui').classList.add('hidden');
            document.getElementById('solver-ui').classList.remove('hidden');
            renderGame();
        }

        function renderGame() {
            const container = document.getElementById('grid-container');
            const hintBox = document.getElementById('hints-display');
            container.innerHTML = '';
            hintBox.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${GRID_SIZE}, minmax(0, 1fr))`;

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const input = document.createElement('input');
                    input.maxLength = 1;
                    const char = internalGrid[r][c];
                    input.className = `w-8 h-8 sm:w-12 sm:h-12 text-center text-xl font-bold uppercase rounded-lg cell 
                        ${char ? 'bg-white/10 border border-white/20' : 'opacity-0 pointer-events-none'}`;
                    if (!char) input.disabled = true;
                    input.id = `cell-${r}-${c}`;
                    
                    // Navigation
                    input.oninput = (e) => { if(e.target.value && c < GRID_SIZE-1) document.getElementById(`cell-${r}-${c+1}`)?.focus(); };
                    container.appendChild(input);
                }
            }

            puzzleData.forEach(item => {
                hintBox.innerHTML += `<div class="p-2 border-l-2 border-blue-500 bg-blue-500/5">❓ ${item.hint} (${item.word.length} letters)</div>`;
            });
        }

        function checkAnswers() {
            let win = true;
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (internalGrid[r][c]) {
                        const val = document.getElementById(`cell-${r}-${c}`).value.toUpperCase();
                        if (val === internalGrid[r][c]) {
                            document.getElementById(`cell-${r}-${c}`).classList.add('correct');
                        } else {
                            win = false;
                        }
                    }
                }
            }

            if (win) {
                confetti({ particleCount: 150, spread: 60, colors: ['#3b82f6', '#10b981'] });
                alert("Zabardast! System successfully solved.");
            } else {
                alert("Kuch galat hai, hints ko dhyan se dekhein.");
            }
        }
    </script>
</body>
</html>
